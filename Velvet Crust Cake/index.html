
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Crust Cakes | Artisan Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cream: #fdf5e6;
            --cream-hover: #f5deb3;
            --cream-dark: #e6d4b8;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-glow: rgba(255, 255, 255, 0.2);
            --text-white: #ffffff;
            --text-dark: #3a2e2b;
            --purple-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --cream-gradient: linear-gradient(135deg, #fdf5e6 0%, #f5deb3 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e9967a 0%, #f4a460 50%, #deb887 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 8%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--cream-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-cream {
            background: var(--cream-gradient);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            color: var(--text-dark);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(245, 245, 220, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-cream::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn-cream:hover::before {
            left: 100%;
        }

        .btn-cream:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 245, 220, 0.5);
        }

        .btn-login {
            background: transparent !important;
            border: 2px solid var(--glass-glow) !important;
            color: var(--text-white) !important;
            backdrop-filter: blur(10px);
        }

        .btn-login:hover {
            background: var(--glass-glow) !important;
            transform: translateY(-2px);
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            margin: 40px auto;
            width: 90%;
            max-width: 1200px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .hero-section {
            position: relative;
            height: 450px;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
        }

        .carousel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            backdrop-filter: blur(10px);
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            max-width: 500px;
        }

        .login-card {
            position: absolute;
            top: 50%;
            right: 5%;
            transform: translateY(-50%);
            width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-glow);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 
                0 25px 45px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: slideInRight 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 10;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateY(-50%) translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .login-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            margin-bottom: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--glass-glow);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin: 3rem 0 2rem;
            background: var(--cream-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .cake-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .cake-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border-color: var(--glass-glow);
        }

        .category-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--cream);
            color: var(--text-dark);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .cake-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .cake-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .cake-card p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--cream-gradient);
            color: var(--text-dark);
            padding: 18px 30px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(245, 245, 220, 0.4);
            font-weight: 600;
            z-index: 3000;
            display: none;
            transform: scale(0.8);
            animation: toastIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes toastIn {
            to {
                transform: scale(1);
            }
        }

        
        @media (max-width: 768px) {
            .login-card {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                margin: 30px auto;
                width: 100%;
                max-width: 400px;
            }
            
            .hero-title {
                font-size: 2.2rem;
            }
            
            nav {
                padding: 1rem 5%;
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">
            <i class="fas fa-birthday-cake"></i> Velvet Crust
        </div>
        <div class="nav-links">
            <a href="#" class="btn-cream active" onclick="showPage('home')">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="#" class="btn-cream" onclick="showPage('shop')">
                <i class="fas fa-store"></i> Shop
            </a>
            <a href="#" class="btn-cream" onclick="showPage('cart')">
                <i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)
            </a>
            <a href="#" class="btn-cream btn-login" onclick="toggleLogin()">
                <i class="fas fa-user"></i> Login
            </a>
        </div>
    </nav>

    <!-- Cart Confirmation Modal -->
    <div id="cart-modal" class="modal-overlay">
        <div class="modal-container">
            <h2 id="modal-title"><i class="fas fa-check-circle"></i> Confirm Selection</h2>
            <p id="modal-msg"></p>
            <div id="qty-box" style="display:none; margin: 25px 0;">
                <label style="display: block; margin-bottom: 10px; font-weight: 500;">
                    <i class="fas fa-hashtag"></i> Quantity:
                </label>
                <input type="number" id="item-qty" value="1" min="1" max="99" class="form-input">
            </div>
            <div style="display: flex; gap: 15px;">
                <button id="modal-yes" class="btn-cream" style="flex:1;">
                    <i class="fas fa-check"></i> Add to Cart
                </button>
                <button id="modal-no" class="btn-cream" style="flex:1; background:rgba(255,255,255,0.15); color:white; border:1px solid var(--glass-glow);">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Hero with Floating Login -->
        <section class="hero-section">
            <img id="carousel-img" class="carousel-img" 
                 src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1400" alt="Velvet Cake">
            <div class="carousel-overlay">
                <h1 class="hero-title">Artisan Crusts, Velvety Centers</h1>
                <p class="hero-subtitle">Handcrafted cakes with premium ingredients, delivered fresh to your door.</p>
                <button class="btn-cream" style="padding: 16px 32px; font-size: 1.1rem;" onclick="showPage('shop')">
                    <i class="fas fa-shopping-bag"></i> Browse Collection
                </button>
            </div>
            
            <!-- Floating Glassmorphism Login Card -->
            <div class="login-card" id="login-card" style="display: none;">
                <div class="login-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>
                
                <div id="login-form" class="form-content active">
                    <div class="form-group">
                        <input type="email" class="form-input" placeholder="&#128231; Email address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-input" id="login-password" placeholder="&#128277; Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('login-password')"
